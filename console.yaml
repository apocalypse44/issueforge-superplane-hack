apiVersion: v1
kind: Console
metadata:
  canvasId: 4d838984-a5ca-422b-83b1-464ac0727045
  name: IssueForge
spec:
  panels:
    - id: pipeline-nodes
      type: nodes
      content:
        title: IssueForge Pipeline
        nodes:
          - node: trigger-issue
            description: Submit a GitHub issue URL to start a run
          - node: fetch-issue
            description: Load GitHub issue title and body
          - node: spec-agent
            description: Groq generates implementation spec
          - node: validate-spec
            description: Validate spec JSON schema
          - node: code-agent
            description: Groq generates PoC file changes
          - node: verify-build
            description: npm install and build
          - node: deploy-render
            description: Push branch and Render preview
          - node: create-pr
            description: Open GitHub pull request
    - id: run-history
      type: table
      content:
        dataSource:
          kind: runs
        render:
          kind: table
          columns:
            - field: status
              label: Status
              format: status
            - field: nodeName
              label: Trigger
            - field: durationMs
              label: Duration
              format: duration
            - field: createdAt
              label: Started
              format: relative
  layout: []
