# IssueForge — SuperPlane Canvas Workflow
#
# 7-node pipeline:
# Trigger → Repo Analyzer → Spec Agent → Code Agent → Verifier → Deploy → PR Agent
#
# All LLM calls use Groq API (llama-3.3-70b-versatile) via runner scripts.
# SuperPlane handles orchestration, durable execution, and state.
#
# IMPORTANT: This is a reference config. Adapt node IDs, integration names,
# and runner references to match your app.superplane.com instance.

name: issueforge
description: "Autonomous software factory — GitHub issue to deployed PR"

nodes:

  # --- Node 1: Trigger ---
  - id: trigger
    name: "Issue Input"
    type: trigger
    trigger:
      type: webhook
    outputs:
      - target: repo-analyzer
    config:
      payload_schema:
        issue_url:
          type: string
          required: true
        max_retries:
          type: number
          required: false
          default: 3

  # --- Node 2: Repo Analyzer ---
  - id: repo-analyzer
    name: "Repo Analyzer"
    type: action
    integration: runner
    config:
      script: |
        # Content of runners/repo_analyzer.sh
      env:
        ISSUE_URL: "{{ trigger.payload.issue_url }}"
        GITHUB_TOKEN: "{{ secrets.GITHUB_TOKEN }}"
        WORKDIR: "/tmp/issueforge/{{ run.id }}"
    outputs:
      - target: spec-agent
    validation:
      expression: "execution.exit_code == 0"

  # --- Node 3: Spec Agent (Groq LLM via runner) ---
  - id: spec-agent
    name: "Spec Agent"
    type: action
    integration: runner
    config:
      script: |
        # Calls Groq API with spec_agent.md prompt + repo context
        # Outputs spec JSON, validates with validate_spec.py
      env:
        GROQ_API_KEY: "{{ secrets.GROQ_API_KEY }}"
        CONTEXT_FILE: "/tmp/issueforge/{{ run.id }}/context.txt"
        WORKDIR: "/tmp/issueforge/{{ run.id }}"
    outputs:
      - target: code-agent
        condition: "execution.exit_code == 0"
    validation:
      expression: "execution.exit_code == 0"

  # --- Node 4: Code Agent (Groq LLM via runner) ---
  - id: code-agent
    name: "Code Agent"
    type: action
    integration: runner
    config:
      script: |
        # Calls Groq API with code_agent.md prompt + spec + repo context
        # Outputs file changes JSON
      env:
        GROQ_API_KEY: "{{ secrets.GROQ_API_KEY }}"
        SPEC_JSON: "/tmp/issueforge/{{ run.id }}/spec.json"
        CONTEXT_FILE: "/tmp/issueforge/{{ run.id }}/context.txt"
        WORKDIR: "/tmp/issueforge/{{ run.id }}"
    outputs:
      - target: verifier

  # --- Node 5: Verifier (with repair loop) ---
  - id: verifier
    name: "Verifier"
    type: action
    integration: runner
    config:
      script: |
        # Content of runners/verifier.sh
      env:
        CHANGES_JSON: "/tmp/issueforge/{{ run.id }}/changes.json"
        REPO_DIR: "/tmp/issueforge/{{ run.id }}/repo"
        SPEC_JSON: "/tmp/issueforge/{{ run.id }}/spec.json"
        CONTEXT_FILE: "/tmp/issueforge/{{ run.id }}/context.txt"
        GROQ_API_KEY: "{{ secrets.GROQ_API_KEY }}"
        MAX_RETRIES: "{{ trigger.payload.max_retries | default(3) }}"
    outputs:
      - target: deploy
        condition: "execution.exit_code == 0"
    validation:
      expression: "execution.exit_code == 0"

  # --- Node 6: Deploy ---
  - id: deploy
    name: "Deploy to Render"
    type: action
    integration: runner
    config:
      script: |
        # Content of runners/deploy.sh
      env:
        REPO_DIR: "/tmp/issueforge/{{ run.id }}/repo"
        GITHUB_TOKEN: "{{ secrets.GITHUB_TOKEN }}"
        REPO_SLUG: "{{ repo-analyzer.output.repo }}"
        ISSUE_NUMBER: "{{ repo-analyzer.output.issue_number }}"
        RENDER_API_KEY: "{{ secrets.RENDER_API_KEY }}"
        RENDER_SERVICE_ID: "{{ secrets.RENDER_SERVICE_ID }}"
    outputs:
      - target: pr-agent
    validation:
      expression: "execution.exit_code == 0"

  # --- Node 7: PR Agent ---
  - id: pr-agent
    name: "Create PR"
    type: action
    integration: runner
    config:
      script: |
        # Content of runners/create_pr.sh
      env:
        REPO_SLUG: "{{ repo-analyzer.output.repo }}"
        ISSUE_NUMBER: "{{ repo-analyzer.output.issue_number }}"
        BRANCH_NAME: "issueforge/{{ repo-analyzer.output.issue_number }}"
        SPEC_JSON: "/tmp/issueforge/{{ run.id }}/spec.json"
        PREVIEW_URL: "{{ deploy.output.preview_url }}"
        VERIFY_JSON: "/tmp/issueforge/{{ run.id }}/verify_result.json"
        GITHUB_TOKEN: "{{ secrets.GITHUB_TOKEN }}"
        WORKDIR: "/tmp/issueforge/{{ run.id }}"
    validation:
      expression: "execution.exit_code == 0"

secrets:
  - GROQ_API_KEY
  - GITHUB_TOKEN
  - RENDER_API_KEY
  - RENDER_SERVICE_ID
