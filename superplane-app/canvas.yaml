apiVersion: v1
kind: Canvas
metadata:
  id: 4d838984-a5ca-422b-83b1-464ac0727045
  name: IssueForge
  description: ''
spec:
  nodes:
    - id: trigger-issue
      name: Submit Issue
      type: TYPE_TRIGGER
      component: start
      configuration:
        templates:
          - name: run
            parameters:
              - name: issue_url
                placeholder: https://github.com/owner/repo/issues/123
                title: GitHub Issue URL
                type: string
            payload:
              issue_url: '{{ parameters.issue_url }}'
      position:
        x: 0
        'y': 0
      isCollapsed: false

    - id: fetch-issue
      name: Fetch Issue
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 120
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_fetch_issue.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
      position:
        x: 600
        'y': 0
      isCollapsed: false

    - id: init-run
      name: Initialize Run
      type: TYPE_ACTION
      component: upsertMemory
      configuration:
        matchList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
        namespace: issueforge_runs
        valueList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
          - name: issue_number
            value: '{{ string($[''Fetch Issue''].data.result.issue_number) }}'
          - name: repo_full_name
            value: '{{ $[''Fetch Issue''].data.result.repo_full_name }}'
          - name: branch_name
            value: '{{ $[''Fetch Issue''].data.result.branch_name }}'
          - name: status
            value: running
          - name: stage
            value: specifying
          - name: started_at
            value: '{{ string(int(now().Unix())) }}'
      position:
        x: 1200
        'y': 0
      isCollapsed: false

    - id: spec-agent
      name: Spec Agent
      type: TYPE_ACTION
      # Claude disabled — Groq via runnerBash (wire OpenAI integration not needed)
      # component: claude.textPrompt
      # model: claude-3-5-sonnet-latest
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 300
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_spec_agent.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: GROQ_API_KEY
            value: REPLACE_GROQ_API_KEY
          - key: OPENROUTER_API_KEY
            value: REPLACE_OPENROUTER_API_KEY
          - key: GROQ_MODEL
            value: '{{ "llama-3.3-70b-versatile" }}'
          - key: OPENROUTER_MODEL
            value: '{{ "meta-llama/llama-3.3-70b-instruct:free" }}'
          - key: LLM_PROVIDER
            value: openrouter
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
      position:
        x: 1800
        'y': 0
      isCollapsed: false

    - id: validate-spec
      name: Validate Spec
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 60
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_validate_spec.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
      position:
        x: 2400
        'y': 0
      isCollapsed: false

    - id: record-spec-failed
      name: Record Spec Failure
      type: TYPE_ACTION
      component: upsertMemory
      configuration:
        matchList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
        namespace: issueforge_runs
        valueList:
          - name: status
            value: failed
          - name: stage
            value: specification_failed
          - name: error
            value: '{{ "Spec validation failed" }}'
      position:
        x: 3000
        'y': 600
      isCollapsed: false

    - id: code-agent
      name: Code Agent
      type: TYPE_ACTION
      # Claude disabled — Groq via runnerBash
      # component: claude.textPrompt
      # model: claude-3-5-sonnet-latest
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 600
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_code_agent.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: GROQ_API_KEY
            value: REPLACE_GROQ_API_KEY
          - key: OPENROUTER_API_KEY
            value: REPLACE_OPENROUTER_API_KEY
          - key: GROQ_MODEL
            value: '{{ "llama-3.3-70b-versatile" }}'
          - key: OPENROUTER_MODEL
            value: '{{ "meta-llama/llama-3.3-70b-instruct:free" }}'
          - key: LLM_PROVIDER
            value: openrouter
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
      position:
        x: 3000
        'y': 0
      isCollapsed: false

    - id: verify-build
      name: Verify Build
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 3600
        machine_type: aws-standard-1
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_verify.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
      position:
        x: 3600
        'y': 0
      isCollapsed: false

    - id: record-verify-failed
      name: Record Verify Failure
      type: TYPE_ACTION
      component: upsertMemory
      configuration:
        matchList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
        namespace: issueforge_runs
        valueList:
          - name: status
            value: failed
          - name: stage
            value: verify_failed
          - name: error
            value: '{{ "npm build verification failed" }}'
      position:
        x: 4200
        'y': 600
      isCollapsed: false

    - id: deploy-render
      name: Deploy
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 600
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_deploy.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
          - key: OUTPUT_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: RENDER_API_KEY
            value: REPLACE_RENDER_API_KEY
          - key: RENDER_SERVICE_ID
            value: REPLACE_RENDER_SERVICE_ID
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
      position:
        x: 4200
        'y': 0
      isCollapsed: false

    - id: record-deploy-failed
      name: Record Deploy Failure
      type: TYPE_ACTION
      component: upsertMemory
      configuration:
        matchList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
        namespace: issueforge_runs
        valueList:
          - name: status
            value: failed
          - name: stage
            value: deployment_failed
          - name: error
            value: '{{ "Deploy to GitHub/Render failed" }}'
      position:
        x: 4800
        'y': 600
      isCollapsed: false

    - id: create-pr
      name: Create PR
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        execution_mode: host
        execution_timeout_seconds: 120
        machine_type: e1-tiny-amd64
        script: |-
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=sp_create_pr.sh
          export FILES_REPO="${FILES_REPO:-apocalypse44/issueforge-superplane-hack}"
          ROOT="/tmp/sp-issueforge"
          INV="$ROOT/runners/sp_invoke.sh"
          if [ ! -f "$INV" ]; then
            echo "Fetching IssueForge scripts into $ROOT ..."
            rm -rf "$ROOT"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${FILES_REPO}.git" "$ROOT"
            else
              git clone --depth 1 "https://github.com/${FILES_REPO}.git" "$ROOT"
            fi
          fi
          if [ -f "$INV" ]; then
            bash "$INV" "$TARGET"
          elif [ -f "$ROOT/runners/sp_canvas_entry.sh" ]; then
            bash "$ROOT/runners/sp_canvas_entry.sh" "$TARGET"
          else
            echo "ERROR: no sp_invoke.sh or sp_canvas_entry.sh under $ROOT"
            ls -la "$ROOT/runners" 2>/dev/null || ls -la "$ROOT"
            exit 1
          fi
        environment_variables:
          - key: GITHUB_TOKEN
            value: REPLACE_GITHUB_TOKEN
          - key: OUTPUT_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
          - key: FILES_REPO
            value: '{{ "apocalypse44/issueforge-superplane-hack" }}'
      position:
        x: 4800
        'y': 0
      isCollapsed: false

    - id: record-success
      name: Record Success
      type: TYPE_ACTION
      component: upsertMemory
      configuration:
        matchList:
          - name: issue_url
            value: '{{ $[''Fetch Issue''].data.result.issue_url }}'
        namespace: issueforge_runs
        valueList:
          - name: status
            value: success
          - name: stage
            value: completed
          - name: pr_url
            value: '{{ $[''Create PR''].data.result.pr_url }}'
          - name: preview_url
            value: '{{ $[''Deploy''].data.result.preview_url }}'
          - name: completed_at
            value: '{{ string(int(now().Unix())) }}'
      position:
        x: 5400
        'y': 0
      isCollapsed: false

  edges:
    - sourceId: trigger-issue
      targetId: fetch-issue
      channel: default
    - sourceId: fetch-issue
      targetId: init-run
      channel: passed
    - sourceId: init-run
      targetId: spec-agent
      channel: default
    - sourceId: spec-agent
      targetId: validate-spec
      channel: passed
    - sourceId: validate-spec
      targetId: code-agent
      channel: passed
    - sourceId: validate-spec
      targetId: record-spec-failed
      channel: failed
    - sourceId: code-agent
      targetId: verify-build
      channel: passed
    - sourceId: verify-build
      targetId: deploy-render
      channel: passed
    - sourceId: verify-build
      targetId: record-verify-failed
      channel: failed
    - sourceId: deploy-render
      targetId: create-pr
      channel: passed
    - sourceId: deploy-render
      targetId: record-deploy-failed
      channel: failed
    - sourceId: create-pr
      targetId: record-success
      channel: passed
