# IssueForge — SuperPlane Canvas
#
# Import via: SuperPlane UI → Files → canvas.yaml, or CLI:
#   superplane apps canvas update -f superplane-app/canvas.yaml
#
# Docs: https://docs.superplane.com/concepts/superplane-apps/
#       https://docs.superplane.com/concepts/canvas/
#       https://docs.superplane.com/components/claude/
#       https://docs.superplane.com/concepts/runners/
#
# Replace metadata.id with your app ID after creating the app.

apiVersion: v1
kind: Canvas
metadata:
  id: REPLACE_WITH_APP_ID
  name: IssueForge
spec:
  edges:
    - sourceId: webhook-issue-input
      targetId: fetch-issue
      channel: default
    - sourceId: fetch-issue
      targetId: spec-agent
      channel: passed
    - sourceId: spec-agent
      targetId: validate-spec
      channel: default
    - sourceId: validate-spec
      targetId: code-agent
      channel: passed
    - sourceId: code-agent
      targetId: verify-build
      channel: default
    - sourceId: verify-build
      targetId: deploy-render
      channel: passed
    - sourceId: deploy-render
      targetId: create-pr
      channel: passed

  nodes:
  # 1) Webhook — POST {"issue_url":"https://github.com/superplanehq/superplane/issues/5368"}
    - id: webhook-issue-input
      name: Issue Webhook
      type: TYPE_TRIGGER
      component: webhook
      paused: false
      position: { x: 0, y: 0 }
      configuration:
        customName: Issue Webhook
        # Hackathon: none. Production: bearer or signature (see SUPERPLANE_SETUP.md)
        authentication: none

    # 2) Fetch issue title + body from GitHub
    - id: fetch-issue
      name: Fetch Issue
      type: TYPE_ACTION
      component: runnerBash
      paused: false
      position: { x: 480, y: 0 }
      configuration:
        customName: Fetch Issue
        executionMode: docker
        containerBaseImage: python:3.12-slim
        setupCommands: |
          apt-get update -qq && apt-get install -y -qq git jq curl >/dev/null
          pip install -q groq pytest 2>/dev/null || true
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export APP_ROOT="${APP_ROOT:-.}"
          bash runners/sp_fetch_issue.sh
        environmentVariables:
          - key: GITHUB_TOKEN
            value: "{{ secrets.GITHUB_TOKEN }}"

    # 3) Spec Agent — Claude Text Prompt
    - id: spec-agent
      name: Spec Agent
      type: TYPE_ACTION
      component: claude.textPrompt
      paused: false
      position: { x: 960, y: 0 }
      configuration:
        customName: Spec Agent
        model: claude-sonnet-4-20250514
        systemMessage: |
          {{ files["prompts/spec_agent.md"] }}
        prompt: |
          {{ $['Fetch Issue'].data.result.issue_text }}

    # 4) Validate spec JSON schema
    - id: validate-spec
      name: Validate Spec
      type: TYPE_ACTION
      component: runnerBash
      paused: false
      position: { x: 1440, y: 0 }
      configuration:
        customName: Validate Spec
        executionMode: docker
        containerBaseImage: python:3.12-slim
        setupCommands: |
          apt-get update -qq && apt-get install -y -qq jq >/dev/null
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export APP_ROOT="${APP_ROOT:-.}"
          bash runners/sp_validate_spec.sh

    # 5) Code Agent — Claude Text Prompt
    - id: code-agent
      name: Code Agent
      type: TYPE_ACTION
      component: claude.textPrompt
      paused: false
      position: { x: 1920, y: 0 }
      configuration:
        customName: Code Agent
        model: claude-sonnet-4-20250514
        systemMessage: |
          {{ files["prompts/code_agent.md"] }}
        prompt: |
          Implement as a deployable React+Vite PoC. Return ONLY a JSON array of file changes.

          {{ $['Spec Agent'].data.text }}

    # 6) Verify — npm install + build
    - id: verify-build
      name: Verify Build
      type: TYPE_ACTION
      component: runnerBash
      paused: false
      position: { x: 2400, y: 0 }
      configuration:
        customName: Verify Build
        executionMode: docker
        containerBaseImage: node:22-bookworm
        setupCommands: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip jq git >/dev/null
          pip3 install -q groq pytest --break-system-packages 2>/dev/null || pip3 install -q groq pytest
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export APP_ROOT="${APP_ROOT:-.}"
          bash runners/sp_verify.sh
        executionTimeout: 3600

    # 7) Deploy — push branch + Render
    - id: deploy-render
      name: Deploy
      type: TYPE_ACTION
      component: runnerBash
      paused: false
      position: { x: 2880, y: 0 }
      configuration:
        customName: Deploy
        executionMode: docker
        containerBaseImage: python:3.12-slim
        setupCommands: |
          apt-get update -qq && apt-get install -y -qq git jq curl >/dev/null
          pip install -q groq pytest 2>/dev/null || true
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export APP_ROOT="${APP_ROOT:-.}"
          bash runners/sp_deploy.sh
        environmentVariables:
          - key: GITHUB_TOKEN
            value: "{{ secrets.GITHUB_TOKEN }}"
          - key: OUTPUT_REPO
            value: "apocalypse44/issueforge-superplane-hack"
          - key: RENDER_API_KEY
            value: "{{ secrets.RENDER_API_KEY }}"
          - key: RENDER_SERVICE_ID
            value: "{{ secrets.RENDER_SERVICE_ID }}"

    # 8) Create PR
    - id: create-pr
      name: Create PR
      type: TYPE_ACTION
      component: runnerBash
      paused: false
      position: { x: 3360, y: 0 }
      configuration:
        customName: Create PR
        executionMode: docker
        containerBaseImage: python:3.12-slim
        setupCommands: |
          apt-get update -qq && apt-get install -y -qq jq git >/dev/null
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export APP_ROOT="${APP_ROOT:-.}"
          bash runners/sp_create_pr.sh
        environmentVariables:
          - key: GITHUB_TOKEN
            value: "{{ secrets.GITHUB_TOKEN }}"
          - key: OUTPUT_REPO
            value: "apocalypse44/issueforge-superplane-hack"
